<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b,#064e3b);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Moving dotted background */
body::before{
    content:"";
    position:absolute;
    inset:-50%;
    background-image:
        radial-gradient(circle, rgba(255,255,255,0.25) 1.5px, transparent 1.5px);
    background-size:35px 35px;
    animation:moveDots 14s linear infinite;
    opacity:0.8;
}

@keyframes moveDots{
    from{transform:translate(0,0) rotate(0deg);}
    to{transform:translate(-180px,-180px) rotate(2deg);}
}

/* Moving line grid */
body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(90deg, rgba(34,197,94,0.12) 1px, transparent 1px),
        linear-gradient(rgba(59,130,246,0.12) 1px, transparent 1px);
    background-size:80px 80px;
    animation:gridMove 8s linear infinite;
    mask-image:linear-gradient(to bottom, transparent, black, transparent);
}

@keyframes gridMove{
    from{background-position:0 0;}
    to{background-position:80px 80px;}
}

/* Glow circles */
.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.75;
    animation:float 6s ease-in-out infinite alternate;
}

.circle.one{
    width:260px;
    height:260px;
    background:#22c55e;
    top:8%;
    left:8%;
}

.circle.two{
    width:320px;
    height:320px;
    background:#3b82f6;
    bottom:8%;
    right:8%;
    animation-delay:2s;
}

.circle.three{
    width:220px;
    height:220px;
    background:#a855f7;
    top:55%;
    left:18%;
    animation-delay:1s;
}

@keyframes float{
    from{transform:translateY(0) scale(1);}
    to{transform:translateY(-45px) scale(1.1);}
}

/* Floating particles */
.particle{
    position:absolute;
    width:8px;
    height:8px;
    background:#fff;
    border-radius:50%;
    opacity:0.5;
    animation:particleMove 12s linear infinite;
}

.particle:nth-child(4){left:10%; animation-delay:0s;}
.particle:nth-child(5){left:25%; animation-delay:2s;}
.particle:nth-child(6){left:45%; animation-delay:4s;}
.particle:nth-child(7){left:65%; animation-delay:1s;}
.particle:nth-child(8){left:85%; animation-delay:3s;}

@keyframes particleMove{
    0%{
        bottom:-20px;
        transform:translateX(0) scale(0.6);
        opacity:0;
    }
    30%{opacity:0.8;}
    100%{
        bottom:110%;
        transform:translateX(80px) scale(1.3);
        opacity:0;
    }
}

/* Login box */
.login-card{
    width:400px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.28);
    box-shadow:0 25px 70px rgba(0,0,0,0.55);
    z-index:10;
    position:relative;
    overflow:hidden;
    animation:slideUp 1s ease, cardFloat 4s ease-in-out infinite;
}

/* Neon rotating border */
.login-card::before{
    content:"";
    position:absolute;
    width:180%;
    height:180%;
    background:conic-gradient(
        transparent,
        #22c55e,
        #3b82f6,
        #a855f7,
        transparent
    );
    top:-40%;
    left:-40%;
    animation:rotateBorder 5s linear infinite;
    z-index:-2;
}

.login-card::after{
    content:"";
    position:absolute;
    inset:2px;
    background:rgba(15,23,42,0.9);
    border-radius:23px;
    z-index:-1;
}

@keyframes rotateBorder{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(60px) scale(0.95);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes cardFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.brand{
    text-align:center;
    color:#22c55e;
    font-weight:800;
    font-size:20px;
    margin-bottom:18px;
    animation:glowText 2s ease-in-out infinite alternate;
}

@keyframes glowText{
    from{text-shadow:0 0 8px #22c55e;}
    to{text-shadow:0 0 20px #22c55e,0 0 35px #3b82f6;}
}

.title{
    color:#fff;
    font-size:32px;
    font-weight:800;
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    color:#cbd5e1;
    text-align:center;
    margin-bottom:25px;
    font-size:14px;
}

.form-control{
    height:50px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.12);
    color:#fff;
    padding-left:18px;
    transition:0.4s;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-control:focus{
    background:rgba(255,255,255,0.18);
    color:#fff;
    border-color:#22c55e;
    box-shadow:0 0 18px rgba(34,197,94,0.45);
    transform:scale(1.03);
}

/* Button animation */
.btn-login{
    height:50px;
    border-radius:14px;
    border:none;
    background:linear-gradient(135deg,#22c55e,#16a34a,#3b82f6);
    color:white;
    font-weight:700;
    letter-spacing:0.5px;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.btn-login::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
    transition:0.5s;
}

.btn-login:hover::before{
    left:100%;
}

.btn-login:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 15px 35px rgba(34,197,94,0.55);
}

.register-link{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#e0f2fe;
    text-decoration:none;
    transition:0.3s;
}

.register-link:hover{
    color:#22c55e;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="circle one"></div>
<div class="circle two"></div>
<div class="circle three"></div>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<div class="login-card">

    <div class="brand">Ticket Triangle Agent</div>

    <h3 class="title">Welcome Back</h3>
    <p class="subtitle">Login to continue your dashboard</p>

    <form method="POST">

        <input type="text" name="username" class="form-control mb-3" placeholder="Enter Username" required>

        <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>

        <button type="submit" class="btn-login w-100">
            Login
        </button>

    </form>

    <a href="/register" class="register-link">
        Create New Account
    </a>

</div>

</body>
</html>
